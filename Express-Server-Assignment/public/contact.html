<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Contact — Express Server</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📧</text></svg>"/>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

  <!-- ── Navbar ── -->
  <nav>
    <a class="nav-logo" href="/">Express<span>Server</span></a>
    <div class="nav-links">
      <a href="/"        >Home</a>

  <!-- ── Page Content ── -->
  <div class="wrapper">

      <div class="badge">📧 Contact</div>
      <h1>Get in touch<br/>with us.</h1>
      <p style="margin-bottom:32px;">
        Contact us at
        <strong style="color:var(--accent);">Zulqarnain@gmail.com</strong> —

      </p>

      <!-- Email Highlight Box -->
      <div class="email-box">
        <div style="font-size:1.8rem;">📩</div>
        <div>
          <div class="email-box-label">Email Address</div>
          <div class="email-box-value">Zulqarnain@gmail.com</div>
        </div>
      </div>

      <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
        <a href="/form" class="btn btn-primary">📬 Send a Message</a>
        <a href="/"     class="btn btn-ghost">← Home</a>
      </div>

    </div>
  </div>

</body>
</html>
